services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_NAME}
    volumes:
      - pgdb:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

  app:
    image: ghcr.io/rudydupuis/rd-tech:latest
    ports:
      - '3000:3000'
    volumes:
      - uploads:/app/uploads
    depends_on:
      - db
    environment:
      DB_HOST: ${POSTGRES_HOST}
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_NAME}
      USERNAME: ${USERNAME}
      PASSWORD: ${PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:

volumes:
  pgdb:
    name: rd-tech_pgdb
  uploads:
    name: rd-tech_uploads 
